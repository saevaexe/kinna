name: Kinna
options:
  bundleIdPrefix: com.osmanseven
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: "$(TARGET_NAME)"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: 5V9A3GUJ32
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    INFOPLIST_FILE: Kinna/Info.plist
    REVENUECAT_API_KEY: "appl_yhDeZCWKWMpkpgfrQXefOaSOifU"

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.0.0

targets:
  Kinna:
    type: application
    platform: iOS
    sources:
      - path: Kinna
        excludes:
          - "Resources/Fonts/**"
      - path: Kinna/Resources/Fonts/Fraunces-Variable.ttf
        buildPhase: resources
      - path: Kinna/Resources/Fonts/Fraunces-Italic-Variable.ttf
        buildPhase: resources
      - path: Kinna/Resources/Fonts/DMSans-Variable.ttf
        buildPhase: resources
      - path: Kinna/Resources/Fonts/DMSans-Italic-Variable.ttf
        buildPhase: resources
    dependencies:
      - package: RevenueCat
        product: RevenueCat
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osmanseven.kinna
        INFOPLIST_FILE: Kinna/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

  KinnaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KinnaTests
    dependencies:
      - target: Kinna
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.osmanseven.kinna.tests
